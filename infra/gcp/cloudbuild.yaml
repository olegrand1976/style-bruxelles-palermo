substitutions:
  _AR_REGION: europe-west1
  _RUN_REGION: europe-west9
  _AR_REPO: style-bruxelles-palermo
  _SERVICE_ACCOUNT: style-bruxelles-palermo-run
  _WEB_SERVICE: style-bruxelles-palermo-web

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: build-web
    name: gcr.io/kaniko-project/executor:latest
    args:
      - --destination=${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/web:$BUILD_ID
      - --destination=${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/web:latest
      - --cache=true
      - --context=dir://.
      - --dockerfile=Dockerfile.prod

  - id: deploy-web
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        IMAGE="${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/web:$BUILD_ID"
        SA="${_SERVICE_ACCOUNT}@$PROJECT_ID.iam.gserviceaccount.com"
        gcloud run deploy ${_WEB_SERVICE} \
          --project="$PROJECT_ID" --image="$$IMAGE" --region="${_RUN_REGION}" \
          --service-account="$$SA" --allow-unauthenticated --port=8080 \
          --memory=512Mi --cpu=1 --concurrency=80 --min-instances=0 --max-instances=3 --timeout=60 \
          --quiet
        URL=$$(gcloud run services describe ${_WEB_SERVICE} --region="${_RUN_REGION}" --format='value(status.url)')
        gcloud run services add-iam-policy-binding ${_WEB_SERVICE} \
          --project="$PROJECT_ID" --region="${_RUN_REGION}" \
          --member=allUsers --role=roles/run.invoker \
          --quiet 2>/dev/null || true
        echo "$$URL"
    waitFor: ["build-web"]
