stages:
  - build
  - deploy

#####################################
# Étape 1 : Build & Push Docker Image
#####################################
build:
  stage: build
  image: docker:20.10.16
  services:
    - name: docker:dind
      alias: docker
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
  script:
    - echo "Checking the code in the runner..."
    - ls -la

    - echo "Current commit (Git):"
    - echo "$(git rev-parse HEAD)"

    - export IMAGE_TAG=${CI_COMMIT_SHORT_SHA}
    - echo "Building Docker image with tags:"
    - echo "$IMAGE_TAG and latest"

    # Construction de l'image avec deux tags en une seule passe
    - docker build -t docker.io/$DOCKERHUB_USERNAME/$DOCKER_IMAGE_NAME:$IMAGE_TAG \
                   -t docker.io/$DOCKERHUB_USERNAME/$DOCKER_IMAGE_NAME:latest \
                   -f Dockerfile.prod .

    - echo "Logging in to Docker Hub..."
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_PASSWORD"

    - echo "Pushing Docker image..."
    # Push du tag court (commit)
    - docker push docker.io/$DOCKERHUB_USERNAME/$DOCKER_IMAGE_NAME:$IMAGE_TAG
    # Push du tag latest
    - docker push docker.io/$DOCKERHUB_USERNAME/$DOCKER_IMAGE_NAME:latest

    - echo "Build & Push complete."

  only:
    - main

#####################################
# Étape 2 : Déploiement sur le serveur
#####################################
deploy:
  stage: deploy
  image: docker:20.10.16
  services:
    - name: docker:dind
      alias: docker
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "⏳ Attente de Docker DIND..."
    - until docker info >/dev/null 2>&1; do echo "⏳ Docker DIND n'est pas encore prêt..."; sleep 3; done
    - echo "✅ Docker DIND prêt."
    - echo "🧹 Nettoyage de l'environnement Docker..."
    - docker system prune -af || true
    - docker volume prune -f || true
    - docker network prune -f || true
    - docker rm $(docker ps -aq) || true
    - docker rmi $(docker images -q) || true
    - echo "✅ Environnement Docker nettoyé."

  script:
    - echo "🔑 Connexion à Docker Hub..."
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_PASSWORD"

    # Si on souhaite déployer la "latest" :
    - echo "Pulling Docker image 'latest' tag..."
    - docker pull docker.io/$DOCKERHUB_USERNAME/$DOCKER_IMAGE_NAME:latest

    # Arrêt et suppression du conteneur existant
    - echo "🚀 Arrêt et suppression de tout conteneur précédent..."
    - docker stop nuxt-container || true
    - docker rm nuxt-container || true

    # Démarrage du nouveau conteneur sur le tag 'latest'
    - echo "🔌 Démarrage du nouveau conteneur..."
    - docker run -d --restart=always -p 3000:3000 --name nuxt-container \
        docker.io/$DOCKERHUB_USERNAME/$DOCKER_IMAGE_NAME:latest

    - echo "✅ Déploiement terminé !"

  only:
    - main