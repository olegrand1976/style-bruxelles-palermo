stages:
  - build
  - deploy

#####################################
# 🛠 Étape 1 : Build & Push Docker Image
#####################################
build:
  stage: build
  image: docker:20.10.16  # Image avec Docker CLI
  services:
    - name: docker:dind
      alias: docker
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: "overlay2"
  before_script:
    - echo "⏳ Attente du démarrage de Docker DIND..."
    - until docker info >/dev/null 2>&1; do echo "⏳ Docker DIND n'est pas encore prêt..."; sleep 3; done
    - echo "✅ Docker DIND est prêt."
    # Clean docker environment
    - echo "🧹 Nettoyage de l'environnement Docker..."
    - docker system prune -af
    - docker volume prune -f
    - docker network prune -f
    - docker rmi $(docker images -q) || true
    - docker rm $(docker ps -aq) || true
    - echo "✅ Environnement Docker nettoyé."
  script:
    - echo "🐳 Construction de l’image Docker..."
    # Utilisation d'un tag unique basé sur l'ID court du commit
    - IMAGE_TAG=${CI_COMMIT_SHORT_SHA}
    - docker build -t docker.io/$DOCKERHUB_USERNAME/$DOCKER_IMAGE_NAME:$IMAGE_TAG -f Dockerfile.prod .
    - echo "🔑 Connexion à Docker Hub..."
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_PASSWORD"
    - echo "📥 Push de l’image Docker..."
    - docker push docker.io/$DOCKERHUB_USERNAME/$DOCKER_IMAGE_NAME:$IMAGE_TAG
  only:
    - main

#####################################
# 🚀 Étape 2 : Déploiement sur le serveur
#####################################
deploy:
  stage: deploy
  image: docker:20.10.16
  services:
    - name: docker:dind
      alias: docker
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "⏳ Attente de Docker DIND..."
    - until docker info >/dev/null 2>&1; do echo "⏳ Docker DIND n'est pas encore prêt..."; sleep 3; done
    - echo "✅ Docker DIND prêt."
    # Clean docker environment
    - echo "🧹 Nettoyage de l'environnement Docker..."
    - docker system prune -af
    - docker volume prune -f
    - docker network prune -f
    - docker rmi $(docker images -q) || true
    - docker rm $(docker ps -aq) || true
    - echo "✅ Environnement Docker nettoyé."
  script:
    - echo "🔑 Connexion à Docker Hub..."
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_PASSWORD"
    - echo "📥 Téléchargement de la dernière image..."
    # Récupération de l'image avec le tag unique
    - IMAGE_TAG=${CI_COMMIT_SHORT_SHA}
    - docker pull docker.io/$DOCKERHUB_USERNAME/$DOCKER_IMAGE_NAME:$IMAGE_TAG
    - docker stop nuxt-container || true
    - docker rm nuxt-container || true
    - docker run -d --restart=always -p 3000:3000 --name nuxt-container docker.io/$DOCKERHUB_USERNAME/$DOCKER_IMAGE_NAME:$IMAGE_TAG
    - echo "✅ Déploiement terminé !"
  only:
    - main
