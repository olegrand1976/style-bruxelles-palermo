#####################################
# Étape 2 : Déploiement sur le serveur
#####################################
deploy:
  stage: deploy
  image: docker:20.10.16           # Version stable avec Docker CLI
  services:
    - name: docker:dind
      alias: docker                # Résolution correcte du service Docker
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  before_script:
    - apk add --no-cache openssh-client sshpass
    - echo "$SERVER_SSH_KEY" > id_rsa
    - chmod 600 id_rsa
    - echo "$SERVER_SSH_KNOWN_HOSTS" > known_hosts
    # Ajout de la clé SSH pour le serveur distant
    - if [ -n "$SERVER_IP" ]; then ssh-keyscan -t ed25519 $SERVER_IP >> known_hosts; else echo "SERVER_IP is not set"; fi
  script:
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_PASSWORD"
    # Récupération de la dernière image Docker
    - docker pull docker.io/$DOCKERHUB_USERNAME/$DOCKER_IMAGE_NAME:latest
    # Connexion SSH pour exécuter le déploiement
    - >
      ssh -i id_rsa -o UserKnownHostsFile=known_hosts -o StrictHostKeyChecking=yes $SERVER_USER@$SERVER_IP "
        docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_PASSWORD &&
        docker pull docker.io/$DOCKERHUB_USERNAME/$DOCKER_IMAGE_NAME:latest &&
        docker stop nuxt-container || true &&
        docker rm nuxt-container || true &&
        docker run -d --restart=always -p 3000:3000 --name nuxt-container \
          docker.io/$DOCKERHUB_USERNAME/$DOCKER_IMAGE_NAME:latest
      "
  after_script:
    - rm -f id_rsa known_hosts
  only:
    - main